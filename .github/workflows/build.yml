name: Build StarLib Editor

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore dependencies
        run: dotnet restore StarLibEditor/StarLibEditor.csproj

      - name: Build
        run: dotnet build StarLibEditor/StarLibEditor.csproj -c Release --no-restore

      - name: Run unit tests
        run: dotnet test Tests/UnitTests/UnitTests.csproj --no-restore --verbosity normal

      - name: Run emulator tests
        run: dotnet test Tests/EmulatorTests/EmulatorTests.csproj --no-restore --verbosity normal

      - name: Publish single-file exe
        run: |
          dotnet publish StarLibEditor/StarLibEditor.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            /p:PublishSingleFile=true `
            /p:EnableCompressionInSingleFile=true `
            -o ./dist

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: StarLibEditor
          path: dist/StarLibEditor.exe
